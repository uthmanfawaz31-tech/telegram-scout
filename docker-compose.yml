version: '3.8'

services:
  redis:
    image: redis:alpine

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/app
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis

  worker:
    build: ./backend
    command: celery -A app.tasks.broadcast worker --loglevel=info
    environment:
      - REDIS_HOST=redis
    depends_on:
      - backend
      - redis

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://telegram-scout.vercel.app/api/v1
    depends_on:
      - backend

volumes:
